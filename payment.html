<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
}

.qr {
    margin: 20px 0;
}

button {
    padding: 10px 20px;
    background: #28a745;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>

<script>
function getTotal(){
    let params = new URLSearchParams(window.location.search);
    let item = params.get("item");
    let price = params.get("price");
    let qty = params.get("qty");

    let total = price * qty;

    document.getElementById("details").innerHTML =
        "Item: " + item + "<br>Quantity: " + qty + "<br>Total: ₹" + total;
}

function confirmOrder(){
    window.location.href = "order.html";
}
</script>

</head>

<body onload="getData()">

<div class="box">
<h2>Payment</h2>

<p id="details"></p>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=9177440252">
</div>

<p>Scan & Pay via UPI</p>

<button onclick="confirmOrder()">I Have Paid</button>

</div>

</body>
</html>
