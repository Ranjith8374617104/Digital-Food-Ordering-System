<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #1f1f1f;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

h2 { margin-bottom: 20px; }

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover { background: #0072ff; }

a { color: #00c6ff; text-decoration: none; }
</style>

</head>

<body>

<div class="container">
<h2>Login</h2>

<form action="login.php" method="POST">
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<p>New user? <a href="register.html">Register</a></p>
</div>

</body>
</html>
