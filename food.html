<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #f6f9fc, #e9eff5);
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    object-fit: cover;
}

select {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 6px;
}

.total-box {
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<header>
    <div>🍽 Food Menu</div>
    <div>Welcome, <span id="username">User</span></div>
</header>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<h3>Pizza ₹200</h3>
<select id="pizza">
<option value="0">Qty: 0</option>
<option value="200">1</option>
<option value="400">2</option>
<option value="600">3</option>
</select>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>Burger ₹120</h3>
<select id="burger">
<option value="0">Qty: 0</option>
<option value="120">1</option>
<option value="240">2</option>
<option value="360">3</option>
</select>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9">
<h3>Pasta ₹180</h3>
<select id="pasta">
<option value="0">Qty: 0</option>
<option value="180">1</option>
<option value="360">2</option>
<option value="540">3</option>
</select>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581636625402-29b2a704ef13">
<h3>Cool Drinks ₹80</h3>
<select id="drink">
<option value="0">Qty: 0</option>
<option value="80">1</option>
<option value="160">2</option>
<option value="240">3</option>
</select>
</div>

</div>

<div class="total-box">
<h2>Total: ₹<span id="total">0</span></h2>
<button onclick="calculateTotal()">Calculate Total</button>
<br><br>
<a href="payment.html"><button>Proceed to Payment</button></a>
</div>

<script>
function calculateTotal() {
    let total =
        parseInt(document.getElementById("pizza").value) +
        parseInt(document.getElementById("burger").value) +
        parseInt(document.getElementById("pasta").value) +
        parseInt(document.getElementById("drink").value);

    document.getElementById("total").innerText = total;
}

// show username (simple demo)
document.getElementById("username").innerText = "Customer";
</script>

</body>
</html>
